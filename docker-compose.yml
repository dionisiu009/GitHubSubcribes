version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gh_notify_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # У prod порти не пробрасываємо назовні — БД доступна лише всередині мережі

  redis:
    image: redis:7-alpine
    container_name: gh_notify_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: gh-notify-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: gh_notify_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8080}:8080"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: gh_notify_network
